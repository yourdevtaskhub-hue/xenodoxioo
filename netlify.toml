[build]
  command = "pnpm run build:client"
  functions = "netlify/functions"
  publish = "dist/spa"

[functions]
  external_node_modules = ["express"]
  node_bundler = "esbuild"
  # Increase timeout for cold starts with Prisma
  node_bundler_target = "es2022"

# API: rewrite /api/* to serverless function (must come first)
[[redirects]]
  force = true
  from = "/api/*"
  status = 200
  to = "/.netlify/functions/api/:splat"

# Uploads: proxy to API function so /uploads/* images work
[[redirects]]
  force = true
  from = "/uploads/*"
  status = 200
  to = "/.netlify/functions/api/uploads/:splat"

# SPA fallback: routes without a matching file serve index.html (fixes /admin, /about, /contact)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
