[build]
  command = "pnpm install && pnpm run build:client"
  functions = "netlify/functions"
  publish = "dist/spa"
  environment = { NODE_ENV = "production" }

[functions]
  external_node_modules = ["express", "serverless-http"]
  node_bundler = "esbuild"
  included_files = ["./Πίνακας Τιμών Δωματίων.txt"]

# iCal sync: import Airbnb/Booking feeds every 15 min
[functions."ical-sync-scheduled"]
  schedule = "*/15 * * * *"

# Payment routes → dedicated functions (must come before generic /api/*)
[[redirects]]
  force = true
  from = "/api/payments/webhook"
  status = 200
  to = "/.netlify/functions/stripe-webhook"

[[redirects]]
  force = true
  from = "/api/payments/create-guest-intent"
  status = 200
  to = "/.netlify/functions/create-guest-payment-intent"

[[redirects]]
  force = true
  from = "/api/payments/confirm-status/*"
  status = 200
  to = "/.netlify/functions/confirm-payment-status"

# Admin stats — dedicated function (ensures custom URL bookings are counted)
[[redirects]]
  force = true
  from = "/api/admin/stats"
  status = 200
  to = "/.netlify/functions/admin-stats"

# API: rewrite remaining /api/* to main api function
[[redirects]]
  force = true
  from = "/api/*"
  status = 200
  to = "/.netlify/functions/api/:splat"

# Debug endpoint for system verification
[[redirects]]
  force = true
  from = "/debug"
  status = 200
  to = "/.netlify/functions/debug"

# Uploads: serve from public folder (static files) instead of redirecting to Supabase
# This allows images to be served directly from the build output
[[redirects]]
  force = false
  from = "/uploads/*"
  status = 200
  to = "/uploads/:splat"

# Domain migration: 301 redirect old domain → new domain (must come before SPA fallback)
[[redirects]]
  from = "https://leonidion-houses.com"
  to = "https://www.leonidionhouses.com"
  status = 301
  force = true

[[redirects]]
  from = "https://leonidion-houses.com/*"
  to = "https://www.leonidionhouses.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.leonidion-houses.com"
  to = "https://www.leonidionhouses.com"
  status = 301
  force = true

[[redirects]]
  from = "https://www.leonidion-houses.com/*"
  to = "https://www.leonidionhouses.com/:splat"
  status = 301
  force = true

# SPA fallback: routes without a matching file serve index.html (fixes /admin, /about, /contact)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for security and caching
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache headers for static assets
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache headers for images (if any remain in /public/)
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Cache headers for uploads folder
[[headers]]
  for = "/uploads/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"
