# Render Blueprint - Backend API για Netlify frontend
# Στο Render Dashboard: προσθέστε Persistent Disk και DATABASE_URL=file:./data/dev.db

services:
  - type: web
    name: leonidionhouses-api
    runtime: node
    plan: free
    buildCommand: pnpm install && pnpm prisma generate && pnpm prisma db push && pnpm db:seed && pnpm run build:server
    startCommand: pnpm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: NODE_ENV
        value: production
